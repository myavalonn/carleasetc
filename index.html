<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>車位出租</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f6f8;
margin:0;
padding:20px;
}

.container{
max-width:700px;
margin:auto;
}

/* 位置資訊：黑色、超大、加粗 */
.main-title{
text-align:center;
font-size:48px; 
font-weight:900;
color:#000000;
margin-bottom:5px;
}

.sub-title{
text-align:center;
font-size:36px;
font-weight:bold;
color:#000000;
margin-bottom:20px;
}

.parking-img {
width: 100%;
border-radius: 14px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
margin-bottom: 25px;
}

/* 縮小高度後的方格 */
.feature-section{
background:white;
padding:10px 25px; /* 縮小上下內距 (從 25px 降至 10px) */
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
font-size:24px; 
line-height:1.4; /* 緊湊一點的行高 */
text-align: center;
}

.highlight{
color:#e60023;
font-weight:bold;
}

/* 針對「好」字的特殊樣式 */
.big-red-hao {
color: #e60023;
font-size: 42px;
font-weight: 900;
vertical-align: middle; /* 讓放大後的字垂直居中 */
}

.card{
background:white;
border-radius:14px;
padding:25px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.plan{
font-size:26px; 
font-weight:bold;
line-height: 1.2;
}

.price{
font-size:28px; 
font-weight:bold;
white-space: nowrap; 
}

.year{
border:4px solid #000000; 
background:#fff5f5;
}

.badge{
background:#000000; 
color:white;
padding:4px 10px;
border-radius:8px;
font-size:16px;
margin-top:6px;
display:inline-block;
}

/* 下方備註區塊保持原樣 */
.info-section{
background:white;
padding:25px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:25px;
font-size:24px; 
line-height:1.9;
text-align: left;
}

</style>

</head>

<body>

<div class="container">

<div class="main-title">小倆口大廈</div>
<div class="sub-title">2號車位 (上層)</div>

<img src="https://ik.imagekit.io/lql1uveoc/IMG_7501.jpeg" class="parking-img">

<!-- 這裡就是縮小高度後的方格 -->
<div class="feature-section">
    <span style="font-size: 32px; font-weight: 900; color: #000;">
        <span class="big-red-hao">好</span>停，<span class="big-red-hao">好</span>出入
    </span><br>
    <span class="highlight" style="font-size: 26px;">🚀 隨時可租</span>
</div>

<div class="card">
<div class="plan">單月<br>方案</div>
<div class="price">NT$ 2,500 / 月</div>
</div>

<div class="card">
<div class="plan">半年<br>方案</div>
<div class="price">NT$ 2,300 / 月</div>
</div>

<div class="card year">
<div>
<div class="plan">一年<br>方案</div>
<div class="badge">👑 最優惠</div>
</div>
<div class="price highlight">NT$ 2,000 / 月</div>
</div>

<div class="info-section">
1. 提前退租：以單月 <span class="highlight">NT$ 2,500 / 月</span> 計算<br>
2. 押金：需 <span class="highlight">NT$ 2,500</span><br>
3. 車位毀損需共同負擔 30% 費用
</div>

</div>

</body>
</html>
