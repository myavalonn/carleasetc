<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>車位出租</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f4f6f8;
margin:0;
padding:15px; /* 稍微縮小外邊距 */
}

.container{
max-width:700px;
margin:auto;
}

.main-title{
text-align:center;
font-size:40px; /* 手機版稍縮小 */
font-weight:900;
color:#000000;
margin-bottom:5px;
}

.sub-title{
text-align:center;
font-size:30px;
font-weight:bold;
color:#000000;
margin-bottom:20px;
}

.parking-img {
width: 100%;
border-radius: 14px;
box-shadow: 0 4px 10px rgba(0,0,0,0.1);
margin-bottom: 25px;
display: block;
}

.feature-section{
background:white;
padding:15px; 
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:20px;
text-align: center;
}

.big-red-hao {
color: #e60023;
font-size: 38px;
font-weight: 900;
vertical-align: middle; 
}

/* 卡片容器優化 */
.card{
background:white;
border-radius:14px;
padding:15px 12px; /* 縮小內距防止溢出 */
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
overflow: hidden; /* 防止內容溢出 */
}

.plan{
font-size:22px; 
font-weight:bold;
line-height: 1.2;
flex-shrink: 0; /* 防止標題被擠壓 */
margin-right: 5px;
}

/* 價格區域：自動調整字體大小 */
.price{
font-size: clamp(18px, 4vw, 26px); /* 根據螢幕寬度自動縮放 */
font-weight:bold;
white-space: nowrap; 
display: flex;         
align-items: center;
flex-shrink: 1;
}

/* 半年折扣 */
.discount-tag-red {
font-size: 0.9em;
font-weight: 900;
margin-right: 5px;
color: #e60023;
}

/* 一年方案發光藥丸：調整手機比例 */
.discount-pill-purple {
display: inline-block;
background: linear-gradient(135deg, #8e24aa, #6a1b9a);
color: #ffffff;
font-size: 0.85em; /* 隨父層價格縮放 */
font-weight: 900;
padding: 4px 12px;
border-radius: 50px;
margin-right: 8px;
box-shadow: 0 2px 10px rgba(106, 27, 154, 0.4);
}

.year{
border:3px solid #000000; 
background:#fff5f5;
}

.highlight{
color:#e60023;
font-weight:bold;
}

.badge{
background:#000000; 
color:white;
padding:2px 8px;
border-radius:6px;
font-size:14px;
margin-top:4px;
display:inline-block;
}

.info-section{
background:white;
padding:20px;
border-radius:14px;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
margin-bottom:25px;
font-size:20px; 
line-height:1.6;
}

/* 針對極小螢幕的微調 */
@media (max-width: 375px) {
    .card { padding: 12px 8px; }
    .plan { font-size: 18px; }
    .price { font-size: 17px; }
}

</style>

</head>

<body>

<div class="container">

<div class="main-title">小倆口大廈</div>
<div class="sub-title">2號車位 (上層)</div>

<img src="https://ik.imagekit.io/lql1uveoc/IMG_7501.jpeg" class="parking-img">

<div class="feature-section">
    <span style="font-size: 28px; font-weight: 900; color: #000;">
        <span class="big-red-hao">好</span>停，<span class="big-red-hao">好</span>出入
    </span><br>
    <span class="highlight" style="font-size: 22px;">🚀 隨時可租⬇️⬇️</span>
</div>

<div class="card">
    <div class="plan">單月<br>方案</div>
    <div class="price">NT$ 2,500 / 月</div>
</div>

<div class="card">
    <div class="plan">半年<br>方案</div>
    <div class="price">
        <span class="discount-tag-red">-8%</span> 
        <span>NT$ 2,300 / 月</span>
    </div>
</div>

<div class="card year">
    <div>
        <div class="plan">一年<br>方案</div>
        <div class="badge">👑 最優惠</div>
    </div>
    <div class="price highlight">
        <span class="discount-pill-purple">-20%</span> 
        <span>NT$ 2,000 / 月</span>
    </div>
</div>

<div class="info-section">
    1. 提前退租：以單月 <span class="highlight">NT$ 2,500 / 月</span> 計算<br>
    2. 押金：需 <span class="highlight">NT$ 2,500</span><br>
    3. 車位毀損需共同負擔 30% 費用
</div>

</div>

</body>
</html>
